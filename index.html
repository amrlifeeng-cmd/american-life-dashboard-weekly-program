<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>American Life Bahçeşehir — Weekly Schedule</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#f8f9fc;--surface:#ffffff;--surface2:#f0f4ff;--border:#dde3f0;
  --gold:#e63946;--gold-l:#ff6b74;--gold-d:rgba(230,57,70,0.1);
  --purple:#1d4ed8;--coral:#e63946;--green:#16a34a;
  --text:#0f1729;--muted:#64748b;
  --red:#e63946;--blue:#1d4ed8;--white:#ffffff;
}
*{box-sizing:border-box;margin:0;padding:0}
@keyframes blink2{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(.8)}}
@keyframes livepulse{0%,100%{opacity:1;box-shadow:0 0 0 0 rgba(22,163,74,.4)}50%{opacity:.7;box-shadow:0 0 0 5px rgba(22,163,74,0)}}
.live-dot{width:8px;height:8px;border-radius:50%;background:#16a34a;animation:livepulse 1.5s infinite;}
body{background:var(--bg);color:var(--text);font-family:"DM Sans",sans-serif;min-height:100vh;font-size:15px}
body::before{content:"";position:fixed;inset:0;pointer-events:none;z-index:0;
  background-image:linear-gradient(rgba(29,78,216,.06) 1px,transparent 1px),
  linear-gradient(90deg,rgba(29,78,216,.06) 1px,transparent 1px);background-size:40px 40px}

/* HEADER */
header{position:sticky;top:0;z-index:100;background:rgba(255,255,255,.97);border-bottom:2px solid var(--red) !important;
  backdrop-filter:blur(20px);border-bottom:1px solid var(--border);
  padding:0 36px;height:78px;display:flex;align-items:center;justify-content:space-between}
.logo-main{font-family:"Playfair Display",serif;font-size:26px;font-weight:900;color:var(--red);letter-spacing:.02em}
.logo-sub{font-size:13px;color:var(--muted);margin-top:4px;letter-spacing:.04em}
.hdr-right{display:flex;align-items:center;gap:14px}
.week-nav{display:flex;align-items:center;background:var(--surface);border:1px solid var(--border);border-radius:10px;overflow:hidden;box-shadow:0 2px 6px rgba(0,0,0,.06)}
.wbtn{background:none;border:none;color:var(--muted);padding:8px 14px;cursor:pointer;font-size:16px;transition:all .2s}
.wbtn:hover:not(:disabled){color:var(--red);background:var(--gold-d)}
.wbtn:disabled{opacity:.3;cursor:default}
#wlabel{padding:8px 18px;font-family:"DM Mono",monospace;font-size:11px;
  color:var(--red);border-left:1px solid var(--border);border-right:1px solid var(--border);
  min-width:125px;text-align:center}
.badge{display:flex;align-items:center;gap:6px;font-size:10px;color:var(--muted);font-family:"DM Mono",monospace}
.dot{width:7px;height:7px;border-radius:50%;background:var(--green)}

/* MAIN */
main{position:relative;z-index:1;max-width:1600px;margin:0 auto;padding:28px 24px}

/* TABS */
.tabs{display:flex;gap:3px;background:var(--surface);border:1px solid var(--border);
  border-radius:10px;padding:4px;margin-bottom:24px;width:fit-content}
.tab{padding:10px 24px;border-radius:8px;font-size:14px;font-weight:500;cursor:pointer;
  color:var(--muted);border:none;background:none;transition:all .2s}
.tab.on{background:var(--red);color:#ffffff;font-weight:600}
.tab:not(.on):hover{color:var(--blue);background:var(--surface2)}
.view{display:none}.view.on{display:block}

/* KPI */
.kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:28px}
.kcard{background:var(--surface);border:1px solid var(--border);border-radius:14px;
  padding:22px;position:relative;overflow:hidden;transition:border-color .3s}
.kcard::before{content:"";position:absolute;top:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,var(--red),var(--blue),transparent)}
.kcard:hover{border-color:var(--red)}
.kico{position:absolute;top:18px;right:18px;font-size:22px;opacity:.12}
.klbl{font-size:11px;text-transform:uppercase;letter-spacing:.12em;color:var(--muted);margin-bottom:10px;font-weight:600}
.kval{font-family:"Playfair Display",serif;font-size:42px;font-weight:700;color:var(--gold);line-height:1;margin-bottom:5px}
.ksub{font-size:12px;color:var(--muted)}

/* CHARTS */
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:28px}
.ccrd{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:22px}
.stitle{font-family:"Playfair Display",serif;font-size:15px;font-weight:700;color:var(--text);
  margin-bottom:14px;display:flex;align-items:center;gap:10px}
.stitle::after{content:"";flex:1;height:2px;background:linear-gradient(90deg,var(--red),var(--blue),transparent)}
.brow{display:flex;align-items:center;gap:10px;margin-bottom:9px}
.blbl{width:148px;font-size:11px;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex-shrink:0}
.btrack{flex:1;height:7px;background:var(--surface2);border-radius:3px;overflow:hidden}
.bfill{height:100%;background:linear-gradient(90deg,var(--red),var(--blue));border-radius:5px;transition:width .8s cubic-bezier(.4,0,.2,1)}
.bfill.acc{background:linear-gradient(90deg,var(--purple),#9d90f0)}
.bval{font-family:"DM Mono",monospace;font-size:11px;color:var(--gold);width:28px;text-align:right;flex-shrink:0}

/* SCHEDULE */
.spanel{background:var(--surface);border:1px solid var(--border);border-radius:14px;overflow:hidden;margin-bottom:28px}
.sscroll{overflow-x:auto}
.stable{min-width:960px;width:100%;border-collapse:collapse}
.stable th{padding:12px 10px;font-size:10px;text-transform:uppercase;letter-spacing:.1em;
  color:var(--muted);background:var(--surface2);border-bottom:1px solid var(--border);
  border-right:1px solid var(--border);font-family:"DM Mono",monospace;text-align:left;font-weight:500}
.stable th.wk{background:#c0392b}
.stable th:first-child{width:155px;min-width:155px}
.stable td{padding:7px;border-bottom:1px solid var(--border);border-right:1px solid var(--border);vertical-align:top;min-width:120px;background:rgba(248,249,252,.5)}
.stable td.tn{font-size:13px;font-weight:700;color:var(--text);
  background:rgba(29,78,216,.04);min-width:170px;max-width:170px;padding:12px;border-left:4px solid var(--blue)}
.stable tr:last-child td{border-bottom:none}
.stable tr:hover td{background:rgba(29,78,216,.05)}
.stable tr:hover td.tn{background:rgba(29,78,216,.1)}

/* PILLS */
.pill{background:rgba(29,78,216,0.07);border:1px solid rgba(29,78,216,.2);font-size:12px;
  border-radius:6px;padding:5px 7px;font-size:10px;line-height:1.4;
  margin-bottom:4px;position:relative;cursor:default;display:block}
.pill:hover{border-color:var(--gold);z-index:20}
.pill:last-child{margin-bottom:0}
.pn{font-weight:700;color:var(--blue);display:block;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:148px;font-size:12px}
.pt{font-family:"DM Mono",monospace;font-size:11px;color:var(--muted);display:block;margin-top:3px;font-weight:500}
.ptags{display:flex;gap:3px;margin-top:3px;flex-wrap:wrap}
.ptag{font-size:9px;padding:2px 7px;border-radius:4px;font-family:"DM Mono",monospace;font-weight:700;letter-spacing:.04em}
.pill.ol{border-color:rgba(124,110,224,.4);background:rgba(124,110,224,.1)}
.pill.vp{border-color:rgba(224,124,110,.4);background:rgba(224,124,110,.1)}
.pill.kd{border-color:rgba(110,224,124,.3);background:rgba(110,224,124,.07)}
.pill.ie{border-color:rgba(201,168,76,.5)}
.t-ol{background:rgba(29,78,216,.15);color:#1d4ed8;border:1px solid rgba(29,78,216,.3)}
.t-vp{background:rgba(230,57,70,.15);color:#e63946;border:1px solid rgba(230,57,70,.3)}
.t-kd{background:rgba(22,163,74,.12);color:#16a34a;border:1px solid rgba(22,163,74,.3)}
.t-ie{background:rgba(230,57,70,.12);color:#e63946;border:1px solid rgba(230,57,70,.25)}

/* TOOLTIP */
.pill:hover::after{content:attr(data-tip);position:absolute;bottom:calc(100% + 8px);left:0;
  background:#ffffff;border:2px solid var(--blue);border-radius:10px;padding:10px 12px;
  font-size:11px;color:var(--text);white-space:pre-wrap;z-index:200;
  min-width:180px;max-width:260px;
  box-shadow:0 8px 24px rgba(29,78,216,.15);pointer-events:none;line-height:1.6;
  font-family:"DM Sans",sans-serif;font-weight:500}
.pill:hover::before{content:"";position:absolute;bottom:calc(100% + 2px);left:12px;
  border:6px solid transparent;border-top-color:var(--blue);z-index:201;pointer-events:none}

/* TEACHER CARDS */
.tgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(255px,1fr));gap:13px;margin-bottom:28px}
.tcrd{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:17px;transition:all .25s}
.tcrd:hover{border-color:var(--red);transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,.3)}
.tcn{font-weight:700;font-size:14px;color:var(--text);margin-bottom:10px;line-height:1.4}
.tcstats{display:flex;gap:16px;margin-bottom:11px}
.tcs{display:flex;flex-direction:column;gap:2px}
.tcv{font-family:"DM Mono",monospace;font-size:26px;color:var(--red);font-weight:700}
.tcl{font-size:10px;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);font-weight:600}
.dstrip{display:flex;gap:4px}
.dpip{display:flex;flex-direction:column;align-items:center;gap:3px}
.dbar{width:25px;height:5px;border-radius:3px;background:var(--border)}
.dbar.on{background:var(--red)}.dbar.wk{background:var(--blue)}
.dlbl{font-size:7px;color:var(--muted);font-family:"DM Mono",monospace}

/* SEARCH */
.swrap{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:22px;margin-bottom:28px}
.sfield{position:relative;margin-bottom:16px}
.sfield input{width:100%;background:var(--surface);border:2px solid var(--border);
  border-radius:9px;padding:13px 13px 13px 42px;color:var(--text);
  font-family:"DM Sans",sans-serif;font-size:14px;outline:none;transition:border-color .3s;box-shadow:0 2px 6px rgba(0,0,0,.06)}
.sfield input:focus{border-color:var(--red)}
.sfield input::placeholder{color:var(--muted)}
.sico{position:absolute;left:13px;top:50%;transform:translateY(-50%);font-size:17px}
.rlist{display:flex;flex-direction:column;gap:7px}
.ritem{background:var(--surface);border:1px solid var(--border);border-radius:9px;
  padding:11px 15px;display:flex;align-items:center;justify-content:space-between;gap:12px;box-shadow:0 1px 4px rgba(0,0,0,.05)}
.rname{font-weight:600;font-size:13px}
.rtags{display:flex;gap:5px;flex-wrap:wrap}
.rtag{font-size:10px;font-family:"DM Mono",monospace;padding:3px 8px;border-radius:20px;border:1px solid}
.rt{color:var(--red);border-color:rgba(230,57,70,.3);background:rgba(230,57,70,.1)}
.rd{color:var(--purple);border-color:rgba(124,110,224,.3);background:rgba(124,110,224,.1)}
.ri{color:var(--muted);border-color:var(--border)}
.ro{color:#9d93f5;border-color:rgba(124,110,224,.3)}
.rv{color:var(--coral);border-color:rgba(224,124,110,.3);background:rgba(224,124,110,.1)}
.nomsg{color:var(--muted);font-size:12px;padding:8px}

@media(max-width:1100px){.kpi-grid{grid-template-columns:repeat(2,1fr)}.two-col{grid-template-columns:1fr}}
@media(max-width:700px){header{padding:0 14px}main{padding:14px}.kpi-grid{grid-template-columns:repeat(2,1fr);gap:10px}}
</style>
</head>
<body>

<header>
  <div>
    <div class="logo-main">American Life</div>
    <div class="logo-sub">Bahçeşehir &middot; Weekly Schedule Dashboard</div>
  </div>
  <div class="hdr-right"><div id="today-badge" style="display:none;align-items:center;gap:6px;background:rgba(230,57,70,.1);border:1px solid rgba(230,57,70,.25);border-radius:20px;padding:5px 14px;font-size:12px;font-weight:600;color:var(--red)">Today: — lessons</div>
    
    <div class="week-nav">
      <button class="wbtn" id="btn-prev">&#8249;</button>
      <div id="wlabel">—</div>
      <button class="wbtn" id="btn-next">&#8250;</button>
    </div>
    <div class="badge"><div class="dot"></div><span>Ready</span></div>
  </div>
</header>

<main>
  <div class="tabs">
    <button class="tab on" data-v="overview">Overview</button>
    <button class="tab" data-v="schedule">Schedule</button>
    <button class="tab" data-v="teachers">Teachers</button>
    <button class="tab" data-v="students">Students</button>
  </div>

  <div class="view on" id="v-overview">
    <div class="kpi-grid">
      <div class="kcard"><div class="kico">&#128218;</div><div class="klbl">Total Ders This Week</div><div class="kval" id="kv1">—</div><div class="ksub">lesson units</div></div>
      <div class="kcard"><div class="kico">&#128105;&#8205;&#127979;</div><div class="klbl">Active Teachers</div><div class="kval" id="kv2">—</div><div class="ksub">this week</div></div>
      <div class="kcard"><div class="kico">&#127891;</div><div class="klbl">Student Sessions</div><div class="kval" id="kv3">—</div><div class="ksub">scheduled entries</div></div>
      <div class="kcard"><div class="kico">&#128187;</div><div class="klbl">Online Lessons</div><div class="kval" id="kv4">—</div><div class="ksub">remote sessions</div></div>
    </div>
    <div class="two-col">
      <div class="ccrd"><div class="stitle">Ders per Teacher</div><div id="ct1"></div></div>
      <div class="ccrd"><div class="stitle">Lessons per Day</div><div id="ct2"></div></div>
    </div>
  </div>

  <div class="view" id="v-schedule">
    <div class="spanel"><div class="sscroll">
      <table class="stable"><thead id="shead"></thead><tbody id="sbody"></tbody></table>
    </div></div>
  </div>

  <div class="view" id="v-teachers">
    <div class="tgrid" id="tgrid"></div>
  </div>

  <div class="view" id="v-students">
    <div class="swrap">
      <div class="sfield"><span class="sico">&#128269;</span>
        <input type="text" id="sinput" placeholder="Type student name to search...">
      </div>
      <div class="rlist" id="rlist"></div>
    </div>
  </div>
</main>

<script>
var D={};

var SHEETS=Object.keys(D);
var DK=["MON","TUE","WED","THU","FRI","SAT","SUN"];
var DF=["Monday","Tuesday","Wednesday","Thursday","Friday","Saturday","Sunday"];
var wi=0,sidx=[];

function findWeek(){
  var today=new Date();
  var M={JAN:0,FEB:1,MAR:2,APR:3,MAY:4,JUN:5,JUL:6,AUG:7,SEP:8,OCT:9,NOV:10,DEC:11};
  for(var i=0;i<SHEETS.length;i++){
    if(!SHEETS[i])continue;
    var m=SHEETS[i].match(/(\d+)-(\d+)\s+([A-Z]+)/);
    if(m&&M[m[3]]!==undefined){
      var s=new Date(2026,M[m[3]],parseInt(m[1]));
      var e=new Date(2026,M[m[3]],parseInt(m[2])+1);
      if(today>=s&&today<e)return i;
    }
  }
  return 0;
}

function formatWeekLabel(sn){
  if(!sn) return "";
  var months={JAN:"Jan",FEB:"Feb",MAR:"Mar",APR:"Apr",MAY:"May",JUN:"Jun",JUL:"Jul",AUG:"Aug",SEP:"Sep",OCT:"Oct",NOV:"Nov",DEC:"Dec"};
  var m=sn.match(/(\d+)-(\d+)\s+([A-Z]+)/);
  if(m&&months[m[3]]){return "Week of "+months[m[3]]+" "+m[1]+" – "+m[2]+", 2026";}
  return sn;
}

function getTodayLessons(data){
  var days=["SUN","MON","TUE","WED","THU","FRI","SAT"];
  var today=days[new Date().getDay()];
  var count=0;
  Object.values(data.teachers).forEach(function(d){count+=(d[today]||[]).length;});
  return count;
}

function render(){
  if(!SHEETS||!SHEETS.length){return;}
  var sn=SHEETS[wi]||"";
  document.getElementById("wlabel").textContent=formatWeekLabel(sn);
  document.getElementById("btn-prev").disabled=wi<=0;
  document.getElementById("btn-next").disabled=wi>=SHEETS.length-1;
  var data=D[sn]||{teachers:{},dayHeaders:[]};
  renderOverview(data);
  renderSchedule(data);
  renderTeachers(data);
  buildIdx(data);
}

function renderOverview(data){
  var ders=0,sess=0,online=0,td={},dc={MON:0,TUE:0,WED:0,THU:0,FRI:0,SAT:0,SUN:0},active=[];
  var teachers=Object.keys(data.teachers);
  for(var i=0;i<teachers.length;i++){
    var t=teachers[i];
    td[t]=0;
    var days=data.teachers[t];
    var dkeys=Object.keys(days);
    for(var j=0;j<dkeys.length;j++){
      var dk=dkeys[j];
      var ls=days[dk];
      for(var k=0;k<ls.length;k++){
        var l=ls[k];
        ders+=l.ders;sess++;
        if(l.online)online++;
        td[t]+=l.ders;
        if(dc[dk]!==undefined)dc[dk]++;
        if(active.indexOf(t)<0)active.push(t);
      }
    }
  }
  document.getElementById("kv1").textContent=ders;
  document.getElementById("kv2").textContent=active.length;
  document.getElementById("kv3").textContent=sess;
  document.getElementById("kv4").textContent=online;

  var st=Object.keys(td).filter(function(t){return td[t]>0;}).sort(function(a,b){return td[b]-td[a];}).slice(0,12);
  var mx=st.length?td[st[0]]:1;
  document.getElementById("ct1").innerHTML=st.length?st.map(function(n){
    return '<div class="brow"><div class="blbl" title="'+n+'">'+n+'</div><div class="btrack"><div class="bfill" style="width:'+(td[n]/mx*100).toFixed(1)+'%"></div></div><div class="bval">'+td[n]+'</div></div>';
  }).join(""):'<span style="color:var(--muted);font-size:12px">No data</span>';

  var mx2=Math.max.apply(null,DK.map(function(k){return dc[k]||0;}));
  if(mx2<1)mx2=1;
  document.getElementById("ct2").innerHTML=DK.map(function(dk,i){
    return '<div class="brow"><div class="blbl">'+DF[i]+'</div><div class="btrack"><div class="bfill'+(i>=5?' acc':'')+ '" style="width:'+(dc[dk]/mx2*100).toFixed(1)+'%"></div></div><div class="bval">'+(dc[dk]||0)+'</div></div>';
  }).join("");
}

function pillHTML(l){
  var cls="pill"+(l.online?" ol":"")+(l.vip?" vp":"")+(l.kids?" kd":"")+(l.ielts?" ie":"");
  var tip=(l.raw||"").replace(/"/g,"&quot;");
  var tags="";
  if(l.online)tags+='<span class="ptag t-ol">ONLINE</span>';
  if(l.vip)tags+='<span class="ptag t-vp">VIP</span>';
  if(l.kids)tags+='<span class="ptag t-kd">KIDS</span>';
  if(l.ielts)tags+='<span class="ptag t-ie">IELTS</span>';
  return '<div class="'+cls+'" data-tip="'+tip+'"><span class="pn">'+l.name+'</span>'+(l.time?'<span class="pt">'+l.time+'</span>':'')+(tags?'<div class="ptags">'+tags+'</div>':'')+'</div>';
}

function renderSchedule(data){
  var teachers=Object.keys(data.teachers);
  var act=teachers.filter(function(t){return DK.some(function(dk){return (data.teachers[t][dk]||[]).length>0;});});
  document.getElementById("shead").innerHTML='<tr><th>Teacher</th>'+DK.map(function(dk,i){return '<th class="'+(i>=5?'wk':'')+'">'+DF[i]+'</th>';}).join("")+'</tr>';
  document.getElementById("sbody").innerHTML=act.map(function(t){
    var d=data.teachers[t];
    return '<tr><td class="tn">'+t+'</td>'+DK.map(function(dk){return '<td>'+(d[dk]||[]).map(pillHTML).join("")+'</td>';}).join("")+'</tr>';
  }).join("");
}

function renderTeachers(data){
  var teachers=Object.keys(data.teachers);
  document.getElementById("tgrid").innerHTML=teachers.map(function(t){
    var days=data.teachers[t];
    var ders=0,sess=0;
    var on=DK.map(function(dk,i){
      var n=(days[dk]||[]).length;
      if(n){sess+=n;(days[dk]||[]).forEach(function(l){ders+=l.ders;});}
      return n>0;
    });
    if(!sess)return "";
    return '<div class="tcrd"><div class="tcn">'+t+'</div><div class="tcstats"><div class="tcs"><div class="tcv">'+ders+'</div><div class="tcl">Lessons</div></div><div class="tcs"><div class="tcv">'+sess+'</div><div class="tcl">Sessions</div></div><div class="tcs"><div class="tcv">'+on.filter(Boolean).length+'</div><div class="tcl">Days</div></div></div><div class="dstrip">'+on.map(function(a,i){return '<div class="dpip"><div class="dbar'+(a?(i>=5?" wk":" on"):"")+'"></div><div class="dlbl">'+DK[i]+'</div></div>';}).join("")+'</div></div>';
  }).join("");
}

function buildIdx(data){
  sidx=[];
  var teachers=Object.keys(data.teachers);
  for(var i=0;i<teachers.length;i++){
    var t=teachers[i];
    var days=data.teachers[t];
    DK.forEach(function(dk,di){
      (days[dk]||[]).forEach(function(l){
        sidx.push({student:l.name,teacher:t,day:DF[di],time:l.time,ders:l.ders,online:l.online,vip:l.vip});
      });
    });
  }
}

document.getElementById("sinput").addEventListener("input",function(e){
  var q=e.target.value.trim().toLowerCase();
  var el=document.getElementById("rlist");
  if(q.length<2){el.innerHTML="";return;}
  var hits=sidx.filter(function(s){return s.student.toLowerCase().indexOf(q)>=0;}).slice(0,30);
  el.innerHTML=hits.length?hits.map(function(r){
    return '<div class="ritem"><div class="rname">'+r.student+'</div><div class="rtags">'
      +'<span class="rtag rt">&#128105;&#8205;&#127979; '+r.teacher+'</span>'
      +'<span class="rtag rd">&#128197; '+r.day+'</span>'
      +(r.time?'<span class="rtag ri">&#128336; '+r.time+'</span>':"")
      +'<span class="rtag ri">'+r.ders+' ders</span>'
      +(r.online?'<span class="rtag ro">&#128187; Online</span>':"")
      +(r.vip?'<span class="rtag rv">&#11088; VIP</span>':"")
      +'</div></div>';
  }).join(""):'<div class="nomsg">No results found</div>';
});

document.querySelectorAll(".tab").forEach(function(tab){
  tab.addEventListener("click",function(){
    document.querySelectorAll(".tab").forEach(function(x){x.classList.remove("on");});
    document.querySelectorAll(".view").forEach(function(x){x.classList.remove("on");});
    tab.classList.add("on");
    document.getElementById("v-"+tab.dataset.v).classList.add("on");
  });
});

document.getElementById("btn-prev").addEventListener("click",function(){if(wi>0){wi--;render();}});
document.getElementById("btn-next").addEventListener("click",function(){if(wi<SHEETS.length-1){wi++;render();}});

wi=findWeek();
render();
</script>
</body>
